<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Attendance System{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="main-header">
        <img src="{{ url_for('static', filename='SRM logo.png') }}" class="logo1">
        <img src="{{ url_for('static', filename='logo2.png') }}" class="logo2">        
        <!-- Group the text together -->
        <div class="header-text">
            <h1>SRM Institute of Science and Technology, Vadapalani</h1>
            <h2>Faculty of Liberal Arts and Business Studies</h2>
        </div>
    </header>

    <main class="content">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 Seating & Attendance Management System.</p>
    </footer>
</body>
</html>
